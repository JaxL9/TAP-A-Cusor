name: Build Expo APK (pnpm)
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Use the version matching your pnpm-lock.yaml

      - name: Setup Node & Java
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Android Folder (Prebuild)
        # This creates the 'android' folder that is missing from your repo
        run: pnpm expo prebuild --platform android --clean

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TAP-A-Cusor-APK
          path: android/app/build/outputs/apk/debug/*.apk
