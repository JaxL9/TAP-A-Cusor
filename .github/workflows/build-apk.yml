name: "Godot APK Build"
on: 
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  export-android:
    name: Build Godot APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: JaxL9/TAP-A-Cusor
          path: godot-project

      - name: Godot Android Export
        uses: dulvui/godot-android-export@v4.0.0
        with:
          working-directory: godot-project
          # Matches typical Godot 4.x versions
          godot-version: 4.2.1 

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TAP-A-Cusor-APK
          path: godot-project/**/*.apk
