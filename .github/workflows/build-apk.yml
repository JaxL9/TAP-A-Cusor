name: Fast APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ⚡ pnpm (fastest package manager)
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # ⚡ Node with cache
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # ⚡ Java for Gradle
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # ⚡ Install deps (cached)
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # ⚡ ONLY prebuild if android folder doesn't exist
      - name: Prebuild (skip if exists)
        run: |
          if [ ! -d "android" ]; then
            pnpm expo prebuild --platform android
          fi

      # ⚡ Bundle JS (optimized)
      - name: Bundle App
        run: npx expo export

      # ⚡ Build APK FAST
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --parallel --build-cache

      # ⚡ Upload result
      - uses: actions/upload-artifact@v4
        with:
          name: Click A Cursor
          path: android/app/build/outputs/apk/release/*.apk
