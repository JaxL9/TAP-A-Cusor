name: "Build TAP-A-Cusor APK"
on: [push, pull_request, workflow_dispatch]

jobs:
  export-android:
    name: Export Android APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.1 # Matches Godot version if applicable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: JaxL9/TAP-A-Cusor
          lfs: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          mkdir -v -p build/android
          # Note: Requires an 'Android' export preset in the Godot project
          godot --headless --verbose --export-debug "Android" build/android/TAP-A-Cusor.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tap-a-cusor-apk
          path: build/android/TAP-A-Cusor.apk

